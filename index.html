<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona Pogodowa</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <header>
        <h1>Prognoza Pogody</h1>
        <div class="input-group mb-3">
            <button class="btn btn-outline-secondary" type="button" onclick="changeLocation()"><img src="images/locationmarker.png" alt="" style="width: 20px;"></button>
            <input type="text" class="locationInput form-control" placeholder="" >
        </div>

            <div>
            <button class="lightMode btn-outline-secondary " onclick="toggleLightMode()" >Dark Mode</button>
            </div>
    </header>

<main class="content-wrapper">

    <section class="glass-card">
        <div class="locationStyle">
            <h2 class="fw-bold">Prognoza na 5 dni</h2>
            <h4 id="location">Warszawa</h4>
        </div>

        <div class="table-responsive">
            <table class="table text-center align-middle custom-table">
                <thead>
                    <tr>
                        <th></th>
                        <th>Dzień 1</th>
                        <th>Dzień 2</th>
                        <th>Dzień 3</th>
                        <th>Dzień 4</th>
                        <th>Dzień 5</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th>Temperatura</th>
                        <td class="temp"></td>
                        <td class="temp"></td>
                        <td class="temp"></td>
                        <td class="temp"></td>
                        <td class="temp"></td>
                    </tr>
                    <tr>
                        <th>Ciśnienie</th>
                        <td class="pressure"></td>
                        <td class="pressure"></td>
                        <td class="pressure"></td>
                        <td class="pressure"></td>
                        <td class="pressure"></td>
                    </tr>
                    <tr>
                        <th>Temp. Odczuwalna</th>
                        <td class="feelsLikeTemp"></td>
                        <td class="feelsLikeTemp"></td>
                        <td class="feelsLikeTemp"></td>
                        <td class="feelsLikeTemp"></td>
                        <td class="feelsLikeTemp"></td>
                    </tr>
                    <tr>
                        <th>Wiatr</th>
                        <td class="windSpeed"></td>
                        <td class="windSpeed"></td>
                        <td class="windSpeed"></td>
                        <td class="windSpeed"></td>
                        <td class="windSpeed"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="glass-card chart-section">
        <h2>Wykres temperatury</h2>
        <div class="chart-container">
            <canvas class="weatherChart"></canvas>
        </div>
    </section>

</main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
